; ────────────── Online (Steam) ──────────────
; 여기를 Null로 되돌리면 코드 수정 없이 LAN 모드로 복귀한다.
; (SISessionSubsystem이 런타임에 서브시스템 이름을 보고 LAN/온라인을 분기하기 때문)
[OnlineSubsystem]
DefaultPlatformService=Steam

[OnlineSubsystemSteam]
bEnabled=true
; 480 = Spacewar. 밸브가 공개해둔 개발용 AppID로, 스팀 파트너 등록 없이 P2P/로비 테스트가 가능하다.
; 실제 출시 시에만 자기 AppID로 교체하면 된다.
SteamDevAppId=480
; 에디터/패키지 실행 시 스팀으로 재실행하지 않는다 (개발 중엔 항상 false)
bRelaunchInSteam=false
; NAT 뒤 유저끼리 직결이 안 될 때 밸브 릴레이 서버를 경유 — 팀원 각자 집에서 붙는 데 핵심
bAllowP2PPacketRelay=true
P2PConnectionTimeout=90

; 세션 트래픽을 IP 소켓 대신 스팀 P2P로 넘긴다 → 호스트 포트포워딩 불필요
