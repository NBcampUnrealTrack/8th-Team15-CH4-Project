[/Script/EngineSettings.GeneralProjectSettings]
; 유저에게 보이는 게임 이름. 창 제목 표시줄과 패키지 빌드의 표시명에 쓰인다.
; ※ 여기서 바꾸는 건 "표시 이름"이지 모듈/프로젝트 이름(TeamProject)이 아니다.
;   모듈명은 /Script/TeamProject.* 경로로 BP와 문자열에 박혀 있어 함부로 못 바꾼다.
ProjectName=Shape It!
ProjectDisplayedTitle=NSLOCTEXT("[/Script/EngineSettings]", "ProjectDisplayedTitle", "Shape It!")

[/Script/UnrealEd.ProjectPackagingSettings]
; ────────────── 패키징에 포함할 맵 ──────────────
; 이 목록이 비어 있으면 쿠커는 GameDefaultMap(MainMenu) 하나만 굽는다.
; 우리 레벨 이동은 전부 문자열 경로(OpenLevel/ServerTravel)라 C++에 하드 레퍼런스가
; 없어서, 쿠커가 "쓰이는 맵"으로 인식하지 못한다. → 여기에 직접 적어줘야 한다.
;
; 빠뜨리면 에디터에선 멀쩡한데 패키징 빌드에서만
;   Travel Failure: [ClientTravelFailure]: Failed to load package '...'
; 로 이동이 실패하고 메인메뉴로 튕긴다.
;
; 레벨을 새로 추가하거나 이름을 바꾸면 여기도 같이 고칠 것.
+MapsToCook=(FilePath="/Game/Shape_It/Level/MainMenu")
+MapsToCook=(FilePath="/Game/Shape_It/Level/Test_Lobby")
+MapsToCook=(FilePath="/Game/Shape_It/Level/MainLevel")
